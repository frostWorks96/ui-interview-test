<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Internal Tool</title>
</head>
<body>
    <h1>Settings</h1>

    <p><a href="saved.html">Saved</a> | <a href="items.html">Browse Items</a> | <a href="home.html">Dashboard</a></p>

    <form action="home.html" method="get">
        <h2>Profile</h2>

        <p>
            <label for="username">Username</label><br>
            <input type="text" id="username" name="username" value="mfrost">
        </p>

        <p>
            <label for="full-name">Full Name</label><br>
            <input type="text" id="full-name" name="full-name" value="Matthew Frost">
        </p>

        <h2>Notifcations</h2>

        <p>
            <input type="checkbox" id="email-alerts" name="email-alerts" checked>
            <label for="email-alerts">Email alerts</label>
        </p>

        <p>
            <input type="checkbox" id="weekly-summary" name="weekly-summary">
            <label for="weekly-summary">Weekly Summary</label>
        </p>

        <h2>Password</h2>

        <p>
            <label for="current-password">Current Password</label><br>
            <input type="password" id="current-password" name="current-password">
        </p>

        <p>
            <label for="new-password">New password</label><br>
            <input type="password" id="new-password" name="new-password">
        </p>

        <p>
            <label for="phone">Phone Number</label><br>
            <input type="text" id="phone" name="phone">
        </p>

        <p>
            <label for="confirm-password">Confirm New Password</label><br>
            <input type="password" id="confirm-password" name="confirm-password">
        </p>

        <p>
            <button type="submit">Go</button>
        </p>
    </form>
</body>
</html>
